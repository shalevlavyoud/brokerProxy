# =============================================================================
# Redis Primary Configuration
# Broker Proxy — Redis #1 (Sentinel topology)
# =============================================================================

# ── Network ──────────────────────────────────────────────────────────────────
bind 0.0.0.0
protected-mode no
port 6379
tcp-backlog 511
timeout 0
tcp-keepalive 300

# ── Persistence (AOF + RDB) ───────────────────────────────────────────────────
# RDB snapshots for fast restarts
save 900 1
save 300 10
save 60 10000
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# AOF for durability (everysec = best balance of durability vs. performance)
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-use-rdb-preamble yes

# ── Replication Safety ────────────────────────────────────────────────────────
# Refuse writes if fewer than 1 replica is connected and in-sync.
# Prevents acknowledged writes from being lost on failover.
min-replicas-to-write 1
min-replicas-max-lag 10

# ── Memory ───────────────────────────────────────────────────────────────────
maxmemory 512mb
# MUST NOT evict: broker-proxy data must never be silently dropped.
maxmemory-policy noeviction

# ── Slow Log (guardrail for hot-key / HGETALL detection) ─────────────────────
# Log commands slower than 10ms
slowlog-log-slower-than 10000
slowlog-max-len 256

# ── Logging ──────────────────────────────────────────────────────────────────
loglevel notice
logfile ""

# ── Latency monitoring ───────────────────────────────────────────────────────
latency-monitor-threshold 50
latency-tracking yes

# ── Misc ──────────────────────────────────────────────────────────────────────
hz 15
dynamic-hz yes
activerehashing yes
