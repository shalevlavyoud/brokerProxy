# =============================================================================
# Redis Replica Configuration
# Broker Proxy — Redis #1 (Sentinel topology)
# =============================================================================

# ── Network ──────────────────────────────────────────────────────────────────
bind 0.0.0.0
protected-mode no
port 6379
tcp-backlog 511
timeout 0
tcp-keepalive 300

# ── Replication ───────────────────────────────────────────────────────────────
# Replicaof is injected at runtime via docker-compose command:
#   redis-server /etc/redis/redis.conf --replicaof redis-primary 6379
replica-serve-stale-data yes
replica-read-only yes
replica-lazy-flush no

# ── Persistence ───────────────────────────────────────────────────────────────
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
aof-use-rdb-preamble yes
dir /data

# ── Memory ───────────────────────────────────────────────────────────────────
maxmemory 512mb
maxmemory-policy noeviction

# ── Slow Log ─────────────────────────────────────────────────────────────────
slowlog-log-slower-than 10000
slowlog-max-len 256

# ── Logging ──────────────────────────────────────────────────────────────────
loglevel notice
logfile ""

# ── Latency monitoring ───────────────────────────────────────────────────────
latency-monitor-threshold 50
latency-tracking yes

# ── Misc ──────────────────────────────────────────────────────────────────────
hz 15
dynamic-hz yes
